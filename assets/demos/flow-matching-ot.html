<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>流匹配（OT 直线路径）轨迹可视化</title>
  <style>
    * { box-sizing: border-box; }
    html { min-height: 100%; margin: 0; background: #0d1117; }
    body {
      min-height: 100vh;
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      justify-content: center;
      padding: 10px 12px 14px;
    }
    button, input { font: inherit; }
    .demo {
      width: min(100%, 620px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
    }
    .eyebrow {
      margin: 0 0 2px;
      color: #8b949e;
      font-size: 11px;
      line-height: 1.2;
    }
    h1 {
      margin: 0;
      color: #79c0ff;
      font-size: 18px;
      font-weight: 650;
      line-height: 1.2;
    }
    .phase {
      max-width: 235px;
      color: #d2a8ff;
      font-size: 12px;
      line-height: 1.35;
      text-align: right;
    }
    .workspace {
      display: grid;
      grid-template-columns: 194px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }
    .controls, .stage {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      box-shadow: 0 14px 32px rgba(1, 4, 9, 0.22);
    }
    .controls {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .stage {
      min-width: 0;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .field-label {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      color: #8b949e;
      font-size: 12px;
    }
    .field-label strong {
      color: #79c0ff;
      font-weight: 650;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    input[type="range"] {
      width: 100%;
      accent-color: #58a6ff;
    }
    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .button-row .wide { grid-column: 1 / -1; }
    .btn {
      min-height: 32px;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #21262d;
      color: #c9d1d9;
      cursor: pointer;
      font-size: 12px;
      font-weight: 650;
    }
    .btn:hover { background: #30363d; }
    .btn.primary {
      background: #238636;
      border-color: #2ea043;
      color: #ffffff;
    }
    .btn.primary:hover { background: #2ea043; }
    .toggle-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
    }
    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #8b949e;
      font-size: 12px;
      line-height: 1.2;
    }
    .toggle input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: #58a6ff;
    }
    .legend {
      display: grid;
      gap: 7px;
      color: #8b949e;
      font-size: 11px;
      line-height: 1.25;
    }
    .legend-item {
      display: grid;
      grid-template-columns: 12px 1fr;
      gap: 7px;
      align-items: center;
      min-width: 0;
    }
    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.24);
    }
    .swatch.noise { background: rgba(121, 192, 255, 0.48); }
    .swatch.target { background: rgba(63, 185, 80, 0.72); }
    .swatch.current { background: #d2a8ff; }
    .swatch.vector {
      height: 2px;
      border-radius: 999px;
      background: #ffa657;
      border: 0;
    }
    .formula {
      margin: 0;
      padding-top: 10px;
      border-top: 1px solid #30363d;
      color: #6e7681;
      font-size: 11px;
      line-height: 1.45;
    }
    .formula strong { color: #c9d1d9; font-weight: 650; }
    #c {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      border-radius: 6px;
      background: #0d1117;
    }
    @media (max-width: 560px) {
      body { padding: 10px; }
      .header {
        align-items: flex-start;
        flex-direction: column;
        gap: 6px;
      }
      .phase {
        max-width: none;
        text-align: left;
      }
      .workspace {
        grid-template-columns: 1fr;
      }
      .controls {
        gap: 10px;
      }
      .button-row {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .button-row .wide { grid-column: auto; }
      .toggle-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .toggle {
        justify-content: flex-start;
      }
    }
    @media (max-width: 380px) {
      .button-row, .toggle-grid {
        grid-template-columns: 1fr;
      }
      .button-row .wide { grid-column: auto; }
    }
  </style>
</head>
<body>
  <main class="demo">
    <header class="header">
      <div>
        <p class="eyebrow">Flow Matching / Optimal Transport Path</p>
        <h1>流匹配直线路径</h1>
      </div>
      <div class="phase" id="phase">源分布：二维高斯噪声</div>
    </header>

    <section class="workspace" aria-label="流匹配交互演示">
      <aside class="controls">
        <div>
          <label class="field-label" for="t">
            <span>时间进度</span>
            <strong>t = <span id="tval">0.00</span></strong>
          </label>
          <input type="range" id="t" min="0" max="1" step="0.01" value="0" />
        </div>

        <div class="button-row" aria-label="播放控制">
          <button class="btn primary wide" type="button" id="playBtn">播放</button>
          <button class="btn" type="button" id="resetBtn">重置</button>
          <button class="btn" type="button" id="resampleBtn">重采样</button>
        </div>

        <div class="toggle-grid" aria-label="显示层开关">
          <label class="toggle" for="showPaths"><span>路径线</span><input id="showPaths" type="checkbox" checked /></label>
          <label class="toggle" for="showVectors"><span>速度箭头</span><input id="showVectors" type="checkbox" checked /></label>
          <label class="toggle" for="showGrid"><span>网格</span><input id="showGrid" type="checkbox" checked /></label>
        </div>

        <div class="legend" aria-label="图例">
          <div class="legend-item"><span class="swatch noise"></span><span>起点噪声 p<sub>0</sub></span></div>
          <div class="legend-item"><span class="swatch target"></span><span>目标曲线 p<sub>1</sub></span></div>
          <div class="legend-item"><span class="swatch current"></span><span>当前粒子 x<sub>t</sub></span></div>
          <div class="legend-item"><span class="swatch vector"></span><span>速度方向 v</span></div>
        </div>

        <p class="formula">
          <strong>x<sub>t</sub> = (1−t)x<sub>0</sub> + tx<sub>1</sub></strong><br />
          v = x<sub>1</sub> − x<sub>0</sub>
        </p>
      </aside>

      <section class="stage">
        <canvas id="c" width="520" height="520" aria-label="流匹配粒子轨迹"></canvas>
      </section>
    </section>
  </main>

  <script>
    (function () {
      const N = 420;
      const AX = 5.2;
      const TARGET_SCALE = 2.8;
      const PAD = 28;
      const PLAY_SECONDS = 4.8;

      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      const stage = document.querySelector(".stage");
      const slider = document.getElementById("t");
      const tVal = document.getElementById("tval");
      const phase = document.getElementById("phase");
      const playBtn = document.getElementById("playBtn");
      const resetBtn = document.getElementById("resetBtn");
      const resampleBtn = document.getElementById("resampleBtn");
      const showPaths = document.getElementById("showPaths");
      const showVectors = document.getElementById("showVectors");
      const showGrid = document.getElementById("showGrid");

      const state = {
        t: 0,
        playing: false,
        cssSize: 420,
        lastFrame: 0
      };

      const x0 = new Float32Array(N);
      const y0 = new Float32Array(N);
      const x1 = new Float32Array(N);
      const y1 = new Float32Array(N);

      function rngNormal() {
        let u = 0;
        let v = 0;
        while (u === 0) u = Math.random();
        while (v === 0) v = Math.random();
        return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
      }

      function sampleParticles() {
        for (let i = 0; i < N; i++) {
          x0[i] = rngNormal() * 0.56;
          y0[i] = rngNormal() * 0.56;

          const u = (i / N) * Math.PI * 2 + (Math.random() - 0.5) * 0.13;
          const jitter = 1 + (Math.random() - 0.5) * 0.035;
          x1[i] = TARGET_SCALE * Math.sin(u) * jitter;
          y1[i] = TARGET_SCALE * Math.sin(u) * Math.cos(u) * jitter;
        }
      }

      function worldToScreen(wx, wy, w, h) {
        const sx = PAD + ((wx + AX) / (2 * AX)) * (w - 2 * PAD);
        const sy = h - PAD - ((wy + AX) / (2 * AX)) * (h - 2 * PAD);
        return [sx, sy];
      }

      function setT(value) {
        state.t = Math.max(0, Math.min(1, value));
        slider.value = state.t.toFixed(2);
        tVal.textContent = state.t.toFixed(2);
        phase.textContent = getPhaseText(state.t);
        draw();
      }

      function getPhaseText(t) {
        if (t < 0.08) return "源分布：二维高斯噪声";
        if (t < 0.45) return "直线插值：沿配对路径移动";
        if (t < 0.9) return "输运过程：速度场指向目标";
        return "目标分布：∞ 形数据曲线";
      }

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const stageWidth = Math.max(260, stage.clientWidth - 16);
        const availableHeight = Math.max(260, window.innerHeight - canvas.getBoundingClientRect().top - 18);
        const mobile = window.matchMedia("(max-width: 560px)").matches;
        const maxCanvas = mobile ? Math.min(520, window.innerHeight * 0.55) : 430;
        const css = Math.floor(Math.max(260, Math.min(stageWidth, availableHeight, maxCanvas)));

        state.cssSize = css;
        canvas.style.width = css + "px";
        canvas.style.height = css + "px";
        canvas.width = Math.round(css * dpr);
        canvas.height = Math.round(css * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        draw();
      }

      function drawGrid(w, h) {
        if (!showGrid.checked) return;
        ctx.save();
        ctx.lineWidth = 1;
        ctx.strokeStyle = "rgba(48, 54, 61, 0.72)";
        for (let g = -5; g <= 5; g++) {
          const [vx1, vy1] = worldToScreen(g, -AX, w, h);
          const [vx2, vy2] = worldToScreen(g, AX, w, h);
          ctx.beginPath();
          ctx.moveTo(vx1, vy1);
          ctx.lineTo(vx2, vy2);
          ctx.stroke();

          const [hx1, hy1] = worldToScreen(-AX, g, w, h);
          const [hx2, hy2] = worldToScreen(AX, g, w, h);
          ctx.beginPath();
          ctx.moveTo(hx1, hy1);
          ctx.lineTo(hx2, hy2);
          ctx.stroke();
        }

        const [xAxisLeftX, xAxisLeftY] = worldToScreen(-AX, 0, w, h);
        const [xAxisRightX, xAxisRightY] = worldToScreen(AX, 0, w, h);
        const [yAxisBottomX, yAxisBottomY] = worldToScreen(0, -AX, w, h);
        const [yAxisTopX, yAxisTopY] = worldToScreen(0, AX, w, h);
        ctx.strokeStyle = "rgba(139, 148, 158, 0.42)";
        ctx.beginPath();
        ctx.moveTo(xAxisLeftX, xAxisLeftY);
        ctx.lineTo(xAxisRightX, xAxisRightY);
        ctx.moveTo(yAxisBottomX, yAxisBottomY);
        ctx.lineTo(yAxisTopX, yAxisTopY);
        ctx.stroke();
        ctx.restore();
      }

      function drawTargetCurve(w, h) {
        ctx.save();
        ctx.lineWidth = 2.2;
        ctx.strokeStyle = "rgba(63, 185, 80, 0.9)";
        ctx.beginPath();
        for (let k = 0; k <= 240; k++) {
          const u = (k / 240) * Math.PI * 2;
          const x = TARGET_SCALE * Math.sin(u);
          const y = TARGET_SCALE * Math.sin(u) * Math.cos(u);
          const [px, py] = worldToScreen(x, y, w, h);
          if (k === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.restore();
      }

      function drawPoints(xs, ys, color, radius, step) {
        const w = state.cssSize;
        const h = state.cssSize;
        ctx.save();
        ctx.fillStyle = color;
        for (let i = 0; i < N; i += step) {
          const [px, py] = worldToScreen(xs[i], ys[i], w, h);
          ctx.beginPath();
          ctx.arc(px, py, radius, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawPaths(w, h) {
        if (!showPaths.checked) return;
        ctx.save();
        ctx.lineWidth = 0.75;
        ctx.strokeStyle = "rgba(88, 166, 255, 0.18)";
        for (let i = 0; i < N; i += 5) {
          const [sx, sy] = worldToScreen(x0[i], y0[i], w, h);
          const [ex, ey] = worldToScreen(x1[i], y1[i], w, h);
          ctx.beginPath();
          ctx.moveTo(sx, sy);
          ctx.lineTo(ex, ey);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawArrow(px, py, ex, ey) {
        const dx = ex - px;
        const dy = ey - py;
        const len = Math.hypot(dx, dy);
        if (len < 0.01) return;

        const ux = dx / len;
        const uy = dy / len;
        const arrowLen = Math.min(32, Math.max(12, len * 0.12));
        const tx = px + ux * arrowLen;
        const ty = py + uy * arrowLen;
        const head = 5;

        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(tx, ty);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(tx, ty);
        ctx.lineTo(tx - ux * head - uy * head * 0.62, ty - uy * head + ux * head * 0.62);
        ctx.moveTo(tx, ty);
        ctx.lineTo(tx - ux * head + uy * head * 0.62, ty - uy * head - ux * head * 0.62);
        ctx.stroke();
      }

      function drawVectors(w, h, t) {
        if (!showVectors.checked) return;
        ctx.save();
        ctx.lineWidth = 1.15;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = "rgba(255, 166, 87, 0.86)";
        for (let i = 0; i < N; i += 18) {
          const xt = (1 - t) * x0[i] + t * x1[i];
          const yt = (1 - t) * y0[i] + t * y1[i];
          const [px, py] = worldToScreen(xt, yt, w, h);
          const [ex, ey] = worldToScreen(xt + x1[i] - x0[i], yt + y1[i] - y0[i], w, h);
          drawArrow(px, py, ex, ey);
        }
        ctx.restore();
      }

      function drawCurrentParticles(w, h, t) {
        const r = Math.max(1.8, w / 210);
        ctx.save();
        for (let i = 0; i < N; i++) {
          const xt = (1 - t) * x0[i] + t * x1[i];
          const yt = (1 - t) * y0[i] + t * y1[i];
          const [px, py] = worldToScreen(xt, yt, w, h);
          ctx.beginPath();
          ctx.arc(px, py, r, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(210, 168, 255, 0.9)";
          ctx.fill();
          if (i % 7 === 0) {
            ctx.strokeStyle = "rgba(255, 255, 255, 0.26)";
            ctx.lineWidth = 0.75;
            ctx.stroke();
          }
        }
        ctx.restore();
      }

      function drawCaption(w, h) {
        ctx.save();
        ctx.fillStyle = "rgba(139, 148, 158, 0.82)";
        ctx.font = "11px system-ui, sans-serif";
        const sourceLabel = "x0: 高斯噪声";
        const targetLabel = "x1: ∞ 目标曲线";
        ctx.fillText(sourceLabel, PAD, 16);
        ctx.fillText(targetLabel, w - PAD - ctx.measureText(targetLabel).width, h - 10);
        ctx.restore();
      }

      function draw() {
        const w = state.cssSize;
        const h = state.cssSize;
        const t = state.t;

        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = "#0d1117";
        ctx.fillRect(0, 0, w, h);

        drawGrid(w, h);
        drawPaths(w, h);
        drawPoints(x0, y0, "rgba(121, 192, 255, 0.32)", Math.max(1.35, w / 260), 1);
        drawTargetCurve(w, h);
        drawPoints(x1, y1, "rgba(63, 185, 80, 0.45)", Math.max(1.2, w / 300), 2);
        drawVectors(w, h, t);
        drawCurrentParticles(w, h, t);
        drawCaption(w, h);
      }

      function tick(now) {
        if (!state.playing) return;
        if (!state.lastFrame) state.lastFrame = now;
        const dt = Math.min(64, now - state.lastFrame);
        state.lastFrame = now;
        setT(state.t + dt / (PLAY_SECONDS * 1000));

        if (state.t >= 1) {
          state.playing = false;
          playBtn.textContent = "播放";
          state.lastFrame = 0;
          return;
        }

        requestAnimationFrame(tick);
      }

      function setPlaying(playing) {
        state.playing = playing;
        playBtn.textContent = playing ? "暂停" : "播放";
        if (playing) {
          if (state.t >= 1) setT(0);
          state.lastFrame = 0;
          requestAnimationFrame(tick);
        }
      }

      slider.addEventListener("input", function () {
        setPlaying(false);
        setT(parseFloat(this.value));
      });

      playBtn.addEventListener("click", function () {
        setPlaying(!state.playing);
      });

      resetBtn.addEventListener("click", function () {
        setPlaying(false);
        setT(0);
      });

      resampleBtn.addEventListener("click", function () {
        setPlaying(false);
        sampleParticles();
        setT(0);
      });

      [showPaths, showVectors, showGrid].forEach(function (control) {
        control.addEventListener("change", draw);
      });

      window.addEventListener("resize", resize);
      sampleParticles();
      setT(0);
      resize();
    })();
  </script>
</body>
</html>
